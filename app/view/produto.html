{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="app-content-header py-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <h3 class="fw-bold text-white mb-0">
                    <i class="bi bi-box-seam me-2" style="color: rgb(68, 4, 252);"></i>
                    {{titulo}}
                </h3>
            </div>
            
            <div class="d-none d-sm-block">
                <a href="/produto/lista" class="btn btn-outline-light rounded-pill px-4 d-flex align-items-center gap-2" 
                   style="border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);">
                    <i class="bi bi-arrow-left-circle" style="color: rgb(68, 4, 252);"></i>
                    <span class="fw-bold small text-white-50">Voltar à Lista</span>
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-xl-10 mx-auto">
                <form id="form" class="needs-validation" novalidate>
                    <input type="hidden" id="acao" name="acao" value="{{acao}}">
                    <input type="hidden" id="id" name="id" value="{{id}}">

                    <div class="card bg-dark border-secondary shadow-lg">
                        <div class="card-header bg-dark py-3 border-bottom border-secondary">
                            <h6 class="m-0 fw-bold text-white-50 text-uppercase small" style="letter-spacing: 1px;">Dados do Produto</h6>
                        </div>

                        <div class="card-body p-4">
                            <div class="row g-4">
                                <div class="col-12">
                                    <label for="nome" class="form-label small fw-bold text-white-50">Nome do Produto</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-secondary border-end-0">
                                            <i class="bi bi-tag-fill" style="color: rgb(68, 4, 252);"></i>
                                        </span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none" 
                                               id="nome" name="nome" placeholder="Ex: Refrigerante Coca-Cola Lata 350ml Original" 
                                               value="{{produto.nome}}" autofocus required>
                                    </div>
                                </div>

                                <div class="col-md-8">
                                    <label for="descricao_curta" class="form-label small fw-bold text-white-50">Descrição Curta (Cupom/Etiqueta)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-secondary border-end-0">
                                            <i class="bi bi-tag" style="color: rgb(68, 4, 252);"></i>
                                        </span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none" 
                                               id="descricao_curta" name="descricao_curta" placeholder="Ex: COCA LATA 350ML" 
                                               value="{{produto.descricao_curta}}" required>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label for="codigo_barras" class="form-label small fw-bold text-white-50">Código de Barras (EAN)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-secondary border-end-0">
                                            <i class="bi bi-upc-scan" style="color: rgb(68, 4, 252);"></i>
                                        </span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none" 
                                               id="codigo_barra" name="codigo_barra" placeholder="789..." 
                                               value="{{produto.codigo_barra}}" required>
                                    </div>
                                </div>

                                <div class="col-md-3">
                                    <label for="preco_custo" class="form-label small fw-bold text-white-50">Preço de Custo</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-secondary border-end-0 text-white-50">R$</span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none money-mask" 
                                               id="valor" name="valor" placeholder="0,00" value="{{produto.valor}}" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer bg-dark border-top border-secondary p-4">
                            <div class="d-grid d-md-flex justify-content-md-end">
                                <button type="button" id="salvar" class="btn btn-lg px-5 fw-bold text-white shadow-lg rounded-pill"
                                        style="background-color: rgb(68, 4, 252); border: none;">
                                    <i class="bi bi-check-circle me-2"></i>
                                    Confirmar Cadastro
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
{% include 'script.html' %}
<script defer type="module" src="/js/produto.js"></script>
{% endblock %}
