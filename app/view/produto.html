{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">
            <i class="bi bi-box-seam me-2"></i>
            {{titulo}}
        </h3>
        <a href="/produto/lista" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left-circle me-1"></i>
            Voltar
        </a>
    </div>

    <div class="row">
        <div class="col-12 col-xl-10 mx-auto">
            <form id="form" class="needs-validation" novalidate>
                <input type="hidden" id="acao" name="acao" value="{{acao}}">
                <input type="hidden" id="id" name="id" value="{{id}}">

                <div class="card">
                    <div class="card-header">
                        <h6 class="m-0 fw-bold text-uppercase small">Dados do Produto</h6>
                    </div>

                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="nome" class="form-label small fw-bold">Nome do Produto</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-tag-fill"></i></span>
                                    <input type="text" class="form-control" id="nome" name="nome" 
                                           placeholder="Ex: Refrigerante Coca-Cola" value="{{produto.nome}}" autofocus required>
                                </div>
                            </div>

                            <div class="col-md-8">
                                <label for="descricao_curta" class="form-label small fw-bold">Descrição Curta</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                    <input type="text" class="form-control" id="descricao_curta" name="descricao_curta" 
                                           placeholder="Ex: COCA LATA 350ML" value="{{produto.descricao_curta}}" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="codigo_barras" class="form-label small fw-bold">Código de Barras (EAN)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                                    <input type="text" class="form-control" id="codigo_barra" name="codigo_barra" 
                                           placeholder="789..." value="{{produto.codigo_barra}}" required>
                                </div>
                            </div>

                            <div class="col-md-3">
                                <label for="preco_custo" class="form-label small fw-bold">Preço de Custo</label>
                                <div class="input-group">
                                    <span class="input-group-text">R$</span>
                                    <input type="text" class="form-control money-mask" id="valor" name="valor" 
                                           placeholder="0,00" value="{{produto.valor}}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer d-flex justify-content-end">
                        <button type="button" id="salvar" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle me-2"></i>
                            Confirmar Cadastro
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
{% include 'script.html' %}
<script defer type="module" src="/js/produto.js"></script>
{% endblock %}
