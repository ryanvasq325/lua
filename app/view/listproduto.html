{% extends "main.html" %}
{% block main %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-sm-6">
            <h3 class="fw-bold">
                <i class="bi bi-box-seam me-2"></i>Gestão de Produtos
            </h3>
        </div>
        <div class="col-sm-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb float-sm-end small">
                    <li class="breadcrumb-item"><a href="/home">Início</a></li>
                    <li class="breadcrumb-item active">Produtos</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-xl-11 mx-auto">
            
            <form id="form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="acao" name="acao">

                <div class="card shadow-sm">
                    <div class="card-header py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="m-0 fw-bold text-uppercase small">Relação de Produtos</h6>

                            <div class="d-flex gap-2">
                                <a href="/produto/print" target="_blank" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-printer"></i> Imprimir
                                </a>

                                <a href="/produto/cadastro" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-circle-fill"></i> Cadastrar Novo
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" id="tabela">
                                <thead class="table-dark small">
                                    <tr>
                                        <th class="ps-4" style="width: 120px;">CÓDIGO</th>
                                        <th>NOME</th>
                                        <th>ESTOQUE ATUAL</th>
                                        <th class="text-center" style="width: 150px;">AÇÕES</th>
                                    </tr>
                                </thead>
                                <tbody class="small">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card-footer py-3">
                        <span class="text-muted small">Mostrando produtos cadastrados no sistema.</span>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}

{% block script %}
{% include "script.html" %}
<script defer type="module" src="/js/listaproduto.js"></script>
{% endblock %}
