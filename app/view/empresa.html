{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="app-content-header py-4">
    <div class="container-fluid">
        <div class="row align-items-center mb-4">
            <div class="col-sm-6">
                <h3 class="fw-bold text-white mb-0">
                    <i class="bi bi-briefcase me-2" style="color: rgb(68, 4, 252);"></i>{{titulo}}
                </h3>
            </div>
            <div class="col-sm-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb float-sm-end bg-dark border border-secondary p-2 px-3 rounded-pill shadow-sm small">
                        <li class="breadcrumb-item"><a href="/home" class="text-decoration-none text-white-50">Início</a></li>
                        <li class="breadcrumb-item"><a href="/empresa/lista" class="text-decoration-none text-white-50">Empresas</a></li>
                        <li class="breadcrumb-item active text-white" aria-current="page">Gestão</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-xl-10 mx-auto">
                <form id="form" class="needs-validation" novalidate>
                    <input type="hidden" id="acao" name="acao" value="{{acao}}">
                    <input type="hidden" id="id" name="id" value="{{id}}">
                    
                    <div class="card border-secondary shadow-lg bg-dark">
                        <div class="card-header bg-dark py-3 border-bottom border-secondary">
                            <div class="d-flex justify-content-between align-items-center">
                                <h6 class="m-0 fw-bold text-white-50 text-uppercase small" style="letter-spacing: 1px;">Dados Cadastrais</h6>
                                <a href="/empresa/lista" class="btn btn-sm border-secondary text-white-50 btn-outline-light rounded-pill px-3">
                                    <i class="bi bi-arrow-left me-1"></i> Voltar à Lista
                                </a>
                            </div>
                        </div>
                        
                        <div class="card-body p-4">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label for="nome_fantasia" class="form-label small fw-bold text-white-50 text-uppercase">Nome Fantasia</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary border-end-0 text-white">
                                            <i class="bi bi-shop" style="color: rgb(68, 4, 252);"></i>
                                        </span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none" id="nome_fantasia" name="nome_fantasia"
                                            placeholder="Nome comercial" value="{{empresa.nome_fantasia}}" autofocus>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="sobrenome_razao" class="form-label small fw-bold text-white-50 text-uppercase">Razão Social</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary shadow-none" id="sobrenome_razao" name="sobrenome_razao"
                                        placeholder="Nome jurídico completo" value="{{empresa.sobrenome_razao}}">
                                </div>

                                <div class="col-md-4">
                                    <label for="rg_ie" class="form-label small fw-bold text-white-50 text-uppercase">Inscrição Estadual (IE)</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary shadow-none" id="rg_ie" name="rg_ie"
                                        placeholder="000.000.000.000" value="{{empresa.rg_ie}}">
                                </div>

                                <div class="col-md-4">
                                    <label for="cpf_cnpj" class="form-label small fw-bold text-white-50 text-uppercase">CNPJ</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary border-end-0 text-white">
                                            <i class="bi bi-card-checklist" style="color: rgb(68, 4, 252);"></i>
                                        </span>
                                        <input type="text" class="form-control bg-dark text-white border-secondary border-start-0 shadow-none" id="cpf_cnpj" name="cpf_cnpj"
                                            placeholder="00.000.000/0000-00" value="{{empresa.cpf_cnpj}}">
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label for="ativo" class="form-label small fw-bold text-white-50 text-uppercase">Status Operacional</label>
                                    <select class="form-select bg-dark text-white border-secondary shadow-none" id="ativo" name="ativo">
                                        <option value="1" {% if empresa.ativo == 1 %}selected{% endif %}>Ativo</option>
                                        <option value="0" {% if empresa.ativo == 0 %}selected{% endif %}>Inativo</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer bg-dark border-top border-secondary p-4">
                            <div class="d-grid d-md-flex justify-content-md-end">
                                <button type="button" id="salvar" class="btn btn-lg px-5 shadow-lg fw-bold text-white rounded-pill"
                                        style="background-color: rgb(68, 4, 252); border: none;">
                                    <i class="bi bi-cloud-arrow-up me-2"></i> Confirmar Cadastro
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
{% include 'script.html' %}
<script defer type="module" src="/js/empresa.js"></script>
{% endblock %}
